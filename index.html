<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🌸 かけいぼ</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 🌸 読み込み中画面のスタイル */
    body { background: #FFF5FA; font-family: sans-serif; margin: 0; }
    #app-loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #FFE0EC; z-index: 9999; }
    .icon { font-size: 50px; animation: bounce 2s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── 【重要】ここが「🌸」を突破するスイッチ ───
    // 一度だけ「true」にして保存→ブラウザで実行してください。
    // 設定画面が出たら「false」に戻して大丈夫です。
    const FORCE_CLEAN = true; 

    function App() {
      const [step, setStep] = useState('loading');

      useEffect(() => {
        if (FORCE_CLEAN) {
          localStorage.clear();
          sessionStorage.clear();
        }
        // 強制的に「APIキー入力画面」へ進める
        setStep('setup');
      }, []);

      if (step === 'loading') return (
        <div id="app-loading"><div className="icon">🌸</div><p>よみこみ中...</p></div>
      );

      return (
        <div style={{ padding: 30, textAlign: 'center' }}>
          <h1>🌸 かけいぼ設定</h1>
          <p>古いデータを掃除しました！</p>
          <div style={{ background: 'white', padding: 20, borderRadius: 15, border: '2px solid #F48FB1' }}>
            <p>ここにAPIキーを入力してください</p>
            <input type="password" placeholder="sk-ant-..." style={{ width: '80%', padding: 10, margin: '10px 0' }} />
            <button onClick={() => alert('保存しました（デモ）')} style={{ background: '#F48FB1', color: 'white', padding: '10px 20px', border: 'none', borderRadius: 20 }}>
              保存
            </button>
          </div>
          <p style={{ marginTop: 20, fontSize: 12, color: '#aaa' }}>
            ※この画面が出たら成功です。
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
